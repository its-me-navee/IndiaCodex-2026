name: probx

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-probx}
      POSTGRES_USER: ${POSTGRES_USER:-probx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-probx}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-probx} -d ${POSTGRES_DB:-probx}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      PROBX_DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://probx:probx@postgres:5432/probx}
      PROBX_REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PROBX_AUTH_SECRET: ${SESSION_SECRET:-local-development-secret-change-me}
      PROBX_SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      PROBX_AUTH_DOMAIN: ${AUTH_DOMAIN:-localhost}
      PROBX_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      PROBX_CARDANO_NETWORK: ${CARDANO_NETWORK:-preprod}
      PROBX_BLOCKFROST_PROJECT_ID: ${BLOCKFROST_PROJECT_ID:-}
      PROBX_BLOCKFROST_BASE_URL: ${BLOCKFROST_BASE_URL:-https://cardano-preprod.blockfrost.io/api/v0}
      PROBX_MARKET_LIFECYCLE_SCRIPT_ADDRESS: ${MARKET_LIFECYCLE_SCRIPT_ADDRESS:-}
      PROBX_MARKET_SCRIPT_ADDRESS: ${MARKET_SCRIPT_ADDRESS:-}
      PROBX_MARKET_SETTLEMENT_SCRIPT_ADDRESS: ${MARKET_SETTLEMENT_SCRIPT_ADDRESS:-}
      PROBX_LIQUIDITY_SCRIPT_ADDRESS: ${LIQUIDITY_SCRIPT_ADDRESS:-}
      PROBX_POSITION_SCRIPT_ADDRESS: ${POSITION_SCRIPT_ADDRESS:-}
      PROBX_ADMIN_PAYMENT_CREDENTIAL: ${ADMIN_PAYMENT_CREDENTIAL:-demo-admin}
      PROBX_ALLOW_DEMO_AUTH: ${DEMO_MODE:-true}
      PROBX_SEED_DEMO_DATA: ${DEMO_MODE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    entrypoint: ["uv", "run", "--no-dev"]
    command: rq worker --url ${REDIS_URL:-redis://redis:6379/0} probx
    healthcheck:
      disable: true
    environment:
      PROBX_DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://probx:probx@postgres:5432/probx}
      PROBX_REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PROBX_ALLOW_DEMO_AUTH: ${DEMO_MODE:-true}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
      VITE_NETWORK: ${CARDANO_NETWORK:-preprod}
      VITE_BLOCKFROST_PROJECT_ID: ${BLOCKFROST_PROJECT_ID:-}
      VITE_MARKET_LIFECYCLE_SCRIPT_ADDRESS: ${MARKET_LIFECYCLE_SCRIPT_ADDRESS:-}
      VITE_MARKET_SCRIPT_ADDRESS: ${MARKET_SCRIPT_ADDRESS:-}
      VITE_MARKET_SETTLEMENT_SCRIPT_ADDRESS: ${MARKET_SETTLEMENT_SCRIPT_ADDRESS:-}
      VITE_LIQUIDITY_SCRIPT_ADDRESS: ${LIQUIDITY_SCRIPT_ADDRESS:-}
      VITE_POSITION_SCRIPT_ADDRESS: ${POSITION_SCRIPT_ADDRESS:-}
      VITE_ADMIN_PAYMENT_CREDENTIAL: ${ADMIN_PAYMENT_CREDENTIAL:-demo-admin}
      VITE_DEMO_FALLBACK: ${DEMO_MODE:-true}
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  redis_data:
