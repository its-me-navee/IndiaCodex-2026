services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: probx
      POSTGRES_USER: probx
      POSTGRES_PASSWORD: probx
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U probx -d probx"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - probx-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      PROBX_DATABASE_URL: postgresql+asyncpg://probx:probx@postgres:5432/probx
      PROBX_REDIS_URL: redis://redis:6379/0
      PROBX_ALLOWED_ORIGINS: http://localhost:5173
      PROBX_AUTH_SECRET: local-compose-secret-change-before-sharing
      PROBX_ALLOW_DEMO_AUTH: "true"
      PROBX_DEMO_ADMIN_KEY: local-demo-admin-only
      PROBX_SEED_DEMO_DATA: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build: .
    command: ["probx-worker"]
    environment:
      PROBX_DATABASE_URL: postgresql+asyncpg://probx:probx@postgres:5432/probx
      PROBX_REDIS_URL: redis://redis:6379/0
      PROBX_AUTH_SECRET: local-compose-secret-change-before-sharing
      PROBX_SEED_DEMO_DATA: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  probx-postgres:

